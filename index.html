<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0e0e10;
      color: #e8e8ed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 8px;
      color: #6e6e73;
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    .card {
      background: #1c1c1e;
      border: 1px solid #2c2c2e;
      border-radius: 16px;
      padding: 28px 24px;
      text-decoration: none;
      color: #e8e8ed;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      border-color: #48484a;
    }

    .card-icon {
      font-size: 1.75rem;
      line-height: 1;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.35;
    }

    .card-label {
      font-size: 0.78rem;
      color: #6e6e73;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    footer {
      margin-top: 64px;
      color: #48484a;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>Pages</h1>
    <p>Click any card to open the page.</p>
  </header>

  <div class="grid">

    <a class="card" href="Intune Enrollment Field Guide - Android and iOS.html">
      <div class="card-icon">📱</div>
      <div class="card-label">Guide</div>
      <div class="card-title">Intune Enrollment Field Guide — Android &amp; iOS</div>
    </a>

    <a class="card" href="overseas-work-approval-automation.html">
      <div class="card-icon">✈️</div>
      <div class="card-label">Automation</div>
      <div class="card-title">Overseas Work Approval Automation</div>
    </a>

    <a class="card" href="tier1-power-automate-runbook.html">
      <div class="card-icon">⚡</div>
      <div class="card-label">Runbook</div>
      <div class="card-title">Tier 1 Power Automate Runbook</div>
    </a>

    <a class="card" href="nz-jobs-visualiser.html">
      <div class="card-icon">📊</div>
      <div class="card-label">Visualiser</div>
      <div class="card-title">NZ Jobs Visualiser</div>
    </a>

  </div>

  <footer>Home &mdash; claude-learnings</footer>

</body>
</html>
